<!DOCTYPE html>
<html>
<head>
  <title>LuckyKita</title>
  <style>
    body {
      text-align:center;
      background:linear-gradient(#4facfe,#00f2fe);
      color:white;
      font-family:Arial;
    }
    .progress {
      width:80%;
      height:20px;
      background:#ccc;
      margin:auto;
    }
    #bar {
      height:100%;
      width:0%;
      background:orange;
    }
  </style>
</head>
<body>

<h2>₱ <span id="bal">0</span></h2>

<div class="progress">
  <div id="bar"></div>
</div>

<p id="need"></p>

<img id="logo" width="200">

<br><br>

<input id="ans" placeholder="Guess menu">
<button onclick="check()">Submit</button>

<br><br>

<button onclick="invite()">Invite</button>
<button onclick="withdraw()">Withdraw</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await signInAnonymously(auth);
const uid = auth.currentUser.uid;

const ref = doc(db,"users",uid);

let user;

const logos = [
 {img:"https://i.imgur.com/3ZQ3ZQn.png",ans:"chickenjoy"},
 {img:"https://i.imgur.com/8Qf6Z6x.png",ans:"jolly spaghetti"},
 {img:"https://i.imgur.com/tX5ZzYF.png",ans:"yum burger"}
];

let current;

async function init(){
 let snap = await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
    balance:30,
    games:0,
    invites:0,
    unlocked:false
  });
 }

 user = (await getDoc(ref)).data();
 update();
 load();
}

function load(){
 current = logos[Math.floor(Math.random()*logos.length)];
 document.getElementById("logo").src = current.img;
}

window.check = async function(){
 if(user.games >= (user.unlocked?20:10)){
  alert("Limit reached");
  return;
 }

 let a = ans.value.toLowerCase();

 if(a===current.ans){
  let r = Math.floor(Math.random()*4)+7;
  user.balance+=r;
  alert("Correct ₱"+r);
 }else{
  alert("Wrong");
 }

 user.games++;
 await updateDoc(ref,user);

 update();
 load();
}

function update(){
 bal.innerText=user.balance;
 bar.style.width=(user.balance/200*100)+"%";
 need.innerText="Need ₱"+(200-user.balance);
}

window.invite=function(){
 let link="https://t.me/YOUR_BOT?start="+uid;
 navigator.clipboard.writeText(link);
 alert("Copied invite link");
}

window.withdraw=async function(){
 let amt=prompt("Amount");

 if(amt<200) return alert("Min 200");
 if(amt>1000) return alert("Max 1000");
 if(amt>user.balance) return alert("No balance");

 user.balance-=amt;
 await updateDoc(ref,user);

 await addDoc(collection(db,"withdrawals"),{
  uid,
  amt,
  status:"pending"
 });

 alert("Requested");
 update();
}

init();

</script>

</body>
</html>
