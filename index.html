<!DOCTYPE html>
<html>
<head>
  <title>GuesstheMenu</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg,#ff9a9e,#fad0c4);
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.balance {
  font-size: 28px;
  font-weight: bold;
  color: #ff4757;
}

.progress {
  height: 10px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}

#bar {
  height: 100%;
  width: 0%;
  background: #ff4757;
}

.logo {
  width: 180px;
  margin: 20px 0;
  filter: blur(10px);
  border-radius: 15px;
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  margin-top: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4757;
  color: white;
  font-weight: bold;
}

.btn-group button {
  margin: 5px;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">

    <div class="balance">₱ <span id="bal">0</span></div>

    <div class="progress">
      <div id="bar"></div>
    </div>

    <p id="need"></p>

    <h3>Guess the Jollibee Menu 🍔</h3>

    <img id="logo" class="logo">

    <input id="ans" placeholder="Type your answer">
    <br>
    <button onclick="check()">Submit Answer</button>

    <div class="btn-group">
      <button onclick="invite()">Invite</button>
      <button onclick="withdraw()">Withdraw</button>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await signInAnonymously(auth);
const uid = auth.currentUser.uid;

const ref = doc(db,"users",uid);

let user;

// 🍔 JOLLIBEE MENU LOGOS
const logos = [
 {img:"https://i.imgur.com/3ZQ3ZQn.png",ans:"chickenjoy"},
 {img:"https://i.imgur.com/8Qf6Z6x.png",ans:"jolly spaghetti"},
 {img:"https://i.imgur.com/tX5ZzYF.png",ans:"yum burger"},
 {img:"https://i.imgur.com/2DhF5Zl.png",ans:"burger steak"},
 {img:"https://i.imgur.com/Wp6XK7s.png",ans:"peach mango pie"}
];

let current;

// INIT USER
async function init(){
 let snap = await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
    balance:30,
    games:0,
    invites:0,
    unlocked:false
  });
 }

 user = (await getDoc(ref)).data();
 update();
 load();
}

// LOAD RANDOM LOGO
function load(){
 current = logos[Math.floor(Math.random()*logos.length)];
 document.getElementById("logo").src = current.img;
 document.getElementById("logo").style.filter="blur(10px)";
}

// CHECK ANSWER
window.check = async function(){

 let maxGames = user.unlocked ? 20 : 10;

 if(user.games >= maxGames){
  alert("Game limit reached");
  return;
 }

 let a = document.getElementById("ans").value.toLowerCase().trim();
 let correct = current.ans.toLowerCase();

 if(a.includes(correct)){
  let reward = Math.floor(Math.random()*4)+7;
  user.balance += reward;

  document.getElementById("logo").style.filter="blur(0px)";
  alert("Correct! ₱"+reward);
 }else{
  alert("Wrong!");
 }

 user.games++;

 await updateDoc(ref,user);

 update();
 setTimeout(load,1000);
}

// UPDATE UI
function update(){
 document.getElementById("bal").innerText = user.balance;

 let percent = (user.balance/200)*100;
 document.getElementById("bar").style.width = percent+"%";

 document.getElementById("need").innerText =
  "Need ₱"+(200-user.balance).toFixed(2)+" to withdraw";
}

// INVITE
window.invite=function(){
 let link="https://t.me/YOUR_BOT?start="+uid;
 navigator.clipboard.writeText(link);
 alert("Invite link copied!");
}

// WITHDRAW
window.withdraw=async function(){
 let amt = prompt("Enter amount");

 if(amt < 200) return alert("Minimum ₱200");
 if(amt > 1000) return alert("Max ₱1000/day");
 if(amt > user.balance) return alert("Not enough balance");

 user.balance -= amt;

 await updateDoc(ref,user);

 await addDoc(collection(db,"withdrawals"),{
  uid,
  amount: amt,
  status:"pending",
  date: new Date().toISOString()
 });

 alert("Withdrawal requested!");
 update();
}

init();

</script>

</body>
</html>
