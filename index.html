<!DOCTYPE html>
<html>
<head>
  <title>Earn with Logo</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg,#4e54c8,#8f94fb);
  color: white;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.balance {
  font-size: 30px;
  font-weight: bold;
}

.progress {
  height: 12px;
  background: #ccc;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}

#bar {
  height: 100%;
  width: 0%;
  background: gold;
}

/* 🎡 SPIN STYLE CIRCLE */
.circle {
  width: 250px;
  height: 250px;
  border-radius: 50%;
  margin: 20px auto;
  background: conic-gradient(
    #ff7675 0% 20%,
    #fdcb6e 20% 40%,
    #55efc4 40% 60%,
    #74b9ff 60% 80%,
    #a29bfe 80% 100%
  );
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo {
  width: 120px;
  filter: blur(8px); /* BLUR EFFECT */
  transition: 0.3s;
}

input {
  width: 80%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: gold;
  font-weight: bold;
}

.btn-group button {
  margin: 5px;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">

    <div class="balance">₱ <span id="bal">0</span></div>

    <div class="progress">
      <div id="bar"></div>
    </div>

    <p id="need"></p>

    <!-- 🎡 SPIN STYLE -->
    <div class="circle">
      <img id="logo" class="logo">
    </div>

    <input id="ans" placeholder="Guess the logo">
    <br>
    <button onclick="check()">Submit</button>

    <div class="btn-group">
      <button onclick="invite()">Invite</button>
      <button onclick="withdraw()">Withdraw</button>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth, signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔴 PASTE YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await signInAnonymously(auth);
const uid = auth.currentUser.uid;

const ref = doc(db,"users",uid);

let user;

const logos = [
 {img:"https://i.imgur.com/3ZQ3ZQn.png",ans:"chickenjoy"},
 {img:"https://i.imgur.com/8Qf6Z6x.png",ans:"jolly spaghetti"},
 {img:"https://i.imgur.com/tX5ZzYF.png",ans:"yum burger"}
];

let current;

async function init(){
 let snap = await getDoc(ref);

 if(!snap.exists()){
  await setDoc(ref,{
    balance:30,
    games:0,
    invites:0,
    unlocked:false
  });
 }

 user = (await getDoc(ref)).data();
 update();
 load();
}

function load(){
 current = logos[Math.floor(Math.random()*logos.length)];
 document.getElementById("logo").src = current.img;
 document.getElementById("logo").style.filter="blur(8px)";
}

window.check = async function(){
 if(user.games >= (user.unlocked?20:10)){
  alert("Limit reached");
  return;
 }

 let a = ans.value.toLowerCase();

 if(a===current.ans){
  let r = Math.floor(Math.random()*4)+7;
  user.balance+=r;

  document.getElementById("logo").style.filter="blur(0px)";
  alert("Correct! ₱"+r);
 }else{
  alert("Wrong!");
 }

 user.games++;

 await updateDoc(ref,user);

 update();
 setTimeout(load,1000);
}

function update(){
 bal.innerText=user.balance;
 bar.style.width=(user.balance/200*100)+"%";
 need.innerText="Need ₱"+(200-user.balance);
}

window.invite=function(){
 let link="https://t.me/YOUR_BOT?start="+uid;
 navigator.clipboard.writeText(link);
 alert("Invite link copied");
}

window.withdraw=async function(){
 let amt=prompt("Amount");

 if(amt<200) return alert("Min ₱200");
 if(amt>1000) return alert("Max ₱1000");
 if(amt>user.balance) return alert("No balance");

 user.balance-=amt;

 await updateDoc(ref,user);

 await addDoc(collection(db,"withdrawals"),{
  uid,
  amt,
  status:"pending"
 });

 alert("Withdraw requested");
 update();
}

init();

</script>

</body>
</html>
